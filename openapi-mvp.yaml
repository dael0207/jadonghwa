openapi: 3.1.0
info:
  title: Work Discovery AI MVP API
  version: 0.1.0
  description: >-
    텍스트·음성 인터뷰를 근거가 연결된 업무 모델로 변환하고,
    개선·자동화 후보 및 G1 솔루션 명세를 생성하는 MVP API 계약.
servers:
  - url: https://api.example.local/v1
security:
  - bearerAuth: []
tags:
  - name: Projects
  - name: Interviews
  - name: Transcripts
  - name: WorkModels
  - name: Opportunities
  - name: DesignPackages
  - name: Blueprints
  - name: Artifacts
paths:
  /projects:
    post:
      tags: [Projects]
      operationId: createProject
      summary: 새 업무 분석 프로젝트 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: 생성됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Projects]
      operationId: getProject
      summary: 프로젝트 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Projects]
      operationId: deleteProject
      summary: 프로젝트와 파생 데이터 삭제 요청
      responses:
        '202':
          description: 삭제 작업 접수
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletionJob'
        '404':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/interviews:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [Interviews]
      operationId: createInterview
      summary: 인터뷰 세션 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInterviewRequest'
      responses:
        '201':
          description: 생성됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Interview'
        '409':
          $ref: '#/components/responses/Problem'
  /interviews/{interviewId}:
    parameters:
      - $ref: '#/components/parameters/InterviewId'
    get:
      tags: [Interviews]
      operationId: getInterview
      summary: 인터뷰 상태 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Interview'
        '404':
          $ref: '#/components/responses/Problem'
  /interviews/{interviewId}/consent:
    parameters:
      - $ref: '#/components/parameters/InterviewId'
    post:
      tags: [Interviews]
      operationId: confirmConsent
      summary: AI·데이터·음성 처리 동의 기록
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsentRequest'
      responses:
        '200':
          description: 동의 기록됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Interview'
        '422':
          $ref: '#/components/responses/Problem'
  /interviews/{interviewId}/answers:
    parameters:
      - $ref: '#/components/parameters/InterviewId'
    post:
      tags: [Interviews]
      operationId: submitTextAnswer
      summary: 텍스트 답변 제출
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnswerRequest'
      responses:
        '202':
          description: 분석 접수
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessingJob'
        '409':
          $ref: '#/components/responses/Problem'
  /interviews/{interviewId}/audio:
    parameters:
      - $ref: '#/components/parameters/InterviewId'
    post:
      tags: [Interviews]
      operationId: submitAudioAnswer
      summary: 음성 답변 업로드 및 전사 요청
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [question_id, file]
              properties:
                question_id:
                  type: string
                file:
                  type: string
                  format: binary
                language:
                  type: string
                  default: ko-KR
      responses:
        '202':
          description: 전사 작업 접수
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscriptionJob'
        '413':
          $ref: '#/components/responses/Problem'
  /transcripts/{transcriptId}:
    parameters:
      - $ref: '#/components/parameters/TranscriptId'
    get:
      tags: [Transcripts]
      operationId: getTranscript
      summary: 전사 결과 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transcript'
        '404':
          $ref: '#/components/responses/Problem'
  /transcripts/{transcriptId}/confirm:
    parameters:
      - $ref: '#/components/parameters/TranscriptId'
    post:
      tags: [Transcripts]
      operationId: confirmTranscript
      summary: 편집된 전사 확정 및 모델 반영
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmTranscriptRequest'
      responses:
        '202':
          description: 모델 반영 접수
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessingJob'
        '409':
          $ref: '#/components/responses/Problem'
  /interviews/{interviewId}/next-question:
    parameters:
      - $ref: '#/components/parameters/InterviewId'
    post:
      tags: [Interviews]
      operationId: generateNextQuestion
      summary: 현재 모델에서 가장 중요한 후속 질문 한 개 생성
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force_closure_audit:
                  type: boolean
                  default: false
      responses:
        '200':
          description: 질문 또는 종료 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NextQuestionResult'
        '409':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/work-model:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [WorkModels]
      operationId: getWorkModel
      summary: 최신 업무 모델 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                description: work-model-v1.schema.json에 의해 검증되는 객체
        '404':
          $ref: '#/components/responses/Problem'
    patch:
      tags: [WorkModels]
      operationId: patchWorkModel
      summary: 사용자 수정사항 반영 및 새 버전 생성
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/JsonPatchOperation'
      responses:
        '200':
          description: 새 버전
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '409':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/work-model/validate:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [WorkModels]
      operationId: validateWorkModel
      summary: 사용자가 업무 지도와 추론을 확인
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateModelRequest'
      responses:
        '200':
          description: 검증 상태 갱신
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'
        '422':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/opportunities/analyze:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [Opportunities]
      operationId: analyzeOpportunities
      summary: ADF 기반 개선·자동화 후보 생성
      responses:
        '202':
          description: 분석 접수
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessingJob'
        '409':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/opportunities:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Opportunities]
      operationId: listOpportunities
      summary: 후보 목록 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
                  description: opportunity-v1.schema.json에 의해 검증되는 객체
  /opportunities/{opportunityId}/design-package:
    parameters:
      - $ref: '#/components/parameters/OpportunityId'
    post:
      tags: [DesignPackages]
      operationId: createDesignPackage
      summary: readiness-gated G1 design package 초안 생성
      responses:
        '201':
          description: 생성됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DesignPackage'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
  /opportunities/{opportunityId}/design-packages:
    parameters:
      - $ref: '#/components/parameters/OpportunityId'
    get:
      tags: [DesignPackages]
      operationId: listOpportunityDesignPackages
      summary: opportunity 기준 design package 목록 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DesignPackage'
        '404':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/design-packages:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [DesignPackages]
      operationId: listProjectDesignPackages
      summary: 프로젝트 기준 design package 목록 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DesignPackage'
        '404':
          $ref: '#/components/responses/Problem'
  /design-packages/{packageId}:
    parameters:
      - $ref: '#/components/parameters/DesignPackageId'
    get:
      tags: [DesignPackages]
      operationId: getDesignPackage
      summary: design package 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DesignPackage'
        '404':
          $ref: '#/components/responses/Problem'
  /design-packages/{packageId}/validate:
    parameters:
      - $ref: '#/components/parameters/DesignPackageId'
    post:
      tags: [DesignPackages]
      operationId: validateDesignPackage
      summary: design-package-v1 schema 검증
      responses:
        '200':
          description: 검증 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaValidationResult'
        '404':
          $ref: '#/components/responses/Problem'
  /opportunities/{opportunityId}/select:
    parameters:
      - $ref: '#/components/parameters/OpportunityId'
    post:
      tags: [Opportunities]
      operationId: selectOpportunity
      summary: 솔루션 명세 생성 대상으로 후보 선택
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [selected]
              properties:
                selected:
                  type: boolean
                notes:
                  type: string
                  maxLength: 4000
      responses:
        '200':
          description: 선택 상태 갱신
          content:
            application/json:
              schema:
                type: object
                required: [opportunity_id, selected]
                properties:
                  opportunity_id:
                    type: string
                  selected:
                    type: boolean
        '409':
          $ref: '#/components/responses/Problem'
  /opportunities/{opportunityId}/blueprint:
    parameters:
      - $ref: '#/components/parameters/OpportunityId'
    post:
      tags: [Blueprints]
      operationId: generateBlueprint
      summary: G1 솔루션 패키지 생성
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                output_language:
                  type: string
                  default: ko-KR
                include_openapi_stub:
                  type: boolean
                  default: true
      responses:
        '202':
          description: 생성 접수
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessingJob'
        '409':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/export:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [Artifacts]
      operationId: exportProject
      summary: 업무 모델·후보·명세를 ZIP으로 내보내기
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                formats:
                  type: array
                  items:
                    type: string
                    enum: [MARKDOWN, JSON, YAML]
                  default: [MARKDOWN, JSON]
      responses:
        '202':
          description: 내보내기 접수
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessingJob'
  /artifacts/{artifactId}:
    parameters:
      - $ref: '#/components/parameters/ArtifactId'
    get:
      tags: [Artifacts]
      operationId: getArtifact
      summary: 산출물 메타데이터와 제한 시간 다운로드 URL 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artifact'
        '404':
          $ref: '#/components/responses/Problem'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
    InterviewId:
      name: interviewId
      in: path
      required: true
      schema:
        type: string
    TranscriptId:
      name: transcriptId
      in: path
      required: true
      schema:
        type: string
    OpportunityId:
      name: opportunityId
      in: path
      required: true
      schema:
        type: string
    DesignPackageId:
      name: packageId
      in: path
      required: true
      schema:
        type: string
    ArtifactId:
      name: artifactId
      in: path
      required: true
      schema:
        type: string
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: 최신 업무 모델 버전 ETag
      schema:
        type: string
  responses:
    Problem:
      description: RFC 9457 스타일 오류 응답
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    CreateProjectRequest:
      type: object
      additionalProperties: false
      required: [title, purpose]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        purpose:
          type: string
          minLength: 1
          maxLength: 2000
        data_region:
          type: string
          maxLength: 50
    Project:
      type: object
      additionalProperties: false
      required: [project_id, title, purpose, status, created_at, updated_at]
      properties:
        project_id:
          type: string
        title:
          type: string
        purpose:
          type: string
        status:
          type: string
          enum: [DRAFT, INTERVIEWING, ANALYZING, BLUEPRINT_READY, PAUSED, DELETION_PENDING, DELETED]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateInterviewRequest:
      type: object
      additionalProperties: false
      required: [mode]
      properties:
        mode:
          type: string
          enum: [QUICK, STANDARD, DEEP]
        language:
          type: string
          default: ko-KR
    ConsentRequest:
      type: object
      additionalProperties: false
      required: [ai_use, data_processing, audio_recording, audio_retention]
      properties:
        ai_use:
          type: boolean
        data_processing:
          type: boolean
        audio_recording:
          type: boolean
        audio_retention:
          type: string
          enum: [DELETE_AFTER_TRANSCRIPT_CONFIRMATION, KEEP_UNTIL_PROJECT_DELETION, NOT_APPLICABLE]
    Interview:
      type: object
      additionalProperties: false
      required: [interview_id, project_id, state, mode, round, created_at, updated_at]
      properties:
        interview_id:
          type: string
        project_id:
          type: string
        state:
          type: string
        mode:
          type: string
        round:
          type: integer
          minimum: 0
        coverage:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AnswerRequest:
      type: object
      additionalProperties: false
      required: [question_id, text]
      properties:
        question_id:
          type: string
        text:
          type: string
          minLength: 1
          maxLength: 50000
        client_answer_id:
          type: string
          description: 재시도 시 중복 생성을 막기 위한 클라이언트 멱등 키
    TranscriptionJob:
      allOf:
        - $ref: '#/components/schemas/ProcessingJob'
        - type: object
          properties:
            transcript_id:
              type: string
    Transcript:
      type: object
      additionalProperties: false
      required: [transcript_id, interview_id, status, text, segments, audio_deletion_policy]
      properties:
        transcript_id:
          type: string
        interview_id:
          type: string
        status:
          type: string
          enum: [PROCESSING, READY_FOR_CONFIRMATION, CONFIRMED, FAILED]
        text:
          type: string
        segments:
          type: array
          items:
            type: object
            required: [segment_id, start_ms, end_ms, text]
            properties:
              segment_id:
                type: string
              start_ms:
                type: integer
                minimum: 0
              end_ms:
                type: integer
                minimum: 0
              text:
                type: string
        audio_deletion_policy:
          type: string
        confirmed_at:
          type: [string, 'null']
          format: date-time
    ConfirmTranscriptRequest:
      type: object
      additionalProperties: false
      required: [confirmed_text]
      properties:
        confirmed_text:
          type: string
          minLength: 1
          maxLength: 50000
        corrections_note:
          type: string
          maxLength: 4000
    NextQuestionResult:
      type: object
      additionalProperties: false
      required: [result]
      properties:
        result:
          type: string
          enum: [QUESTION, NEEDS_EVIDENCE, READY_WITH_ASSUMPTIONS, READY_FOR_ANALYSIS, NOT_SUITABLE]
        question:
          oneOf:
            - $ref: '#/components/schemas/Question'
            - type: 'null'
        open_evidence_requests:
          type: array
          items:
            type: string
    Question:
      type: object
      additionalProperties: false
      required: [question_id, text, question_type, why_it_matters]
      properties:
        question_id:
          type: string
        text:
          type: string
        question_type:
          type: string
        why_it_matters:
          type: string
        answer_format_hint:
          type: string
    ValidateModelRequest:
      type: object
      additionalProperties: false
      required: [model_version, confirmed, corrections]
      properties:
        model_version:
          type: integer
          minimum: 1
        confirmed:
          type: boolean
        corrections:
          type: array
          items:
            $ref: '#/components/schemas/JsonPatchOperation'
        notes:
          type: string
          maxLength: 4000
    ValidationResult:
      type: object
      additionalProperties: false
      required: [model_id, version, status, understanding_gate]
      properties:
        model_id:
          type: string
        version:
          type: integer
        status:
          type: string
        understanding_gate:
          type: object
          additionalProperties: true
    SchemaValidationResult:
      type: object
      additionalProperties: false
      required: [valid, schema_name]
      properties:
        valid:
          type: boolean
        schema_name:
          type: string
        error:
          type: [string, 'null']
    DesignPackage:
      type: object
      additionalProperties: false
      required:
        - id
        - project_id
        - opportunity_id
        - work_model_version
        - payload
        - schema_valid
        - created_at
      properties:
        id:
          type: string
        project_id:
          type: string
        opportunity_id:
          type: string
        work_model_version:
          type: integer
          minimum: 1
        payload:
          type: object
          additionalProperties: true
          description: design-package-v1.schema.json에 의해 검증되는 객체
        schema_valid:
          type: boolean
        created_at:
          type: string
          format: date-time
    JsonPatchOperation:
      type: object
      required: [op, path]
      properties:
        op:
          type: string
          enum: [add, remove, replace, move, copy, test]
        path:
          type: string
        from:
          type: string
        value: {}
    ProcessingJob:
      type: object
      additionalProperties: false
      required: [job_id, status, submitted_at]
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: [QUEUED, RUNNING, SUCCEEDED, FAILED]
        submitted_at:
          type: string
          format: date-time
    DeletionJob:
      type: object
      additionalProperties: false
      required: [deletion_job_id, project_id, status, requested_at]
      properties:
        deletion_job_id:
          type: string
        project_id:
          type: string
        status:
          type: string
          enum: [QUEUED, RUNNING, COMPLETED, FAILED]
        requested_at:
          type: string
          format: date-time
    Artifact:
      type: object
      additionalProperties: false
      required: [artifact_id, project_id, kind, status, created_at]
      properties:
        artifact_id:
          type: string
        project_id:
          type: string
        kind:
          type: string
          enum: [PROJECT_EXPORT, SOLUTION_BLUEPRINT, WORK_MODEL, OPPORTUNITY_REPORT]
        status:
          type: string
          enum: [GENERATING, READY, FAILED, EXPIRED]
        download_url:
          type: [string, 'null']
          format: uri
        expires_at:
