openapi: 3.1.0
info:
  title: Work Discovery AI MVP API
  version: 0.9.0
  description: >-
    텍스트·음성 인터뷰를 근거가 연결된 업무 모델로 변환하고,
    개선·자동화 후보, G1 솔루션 명세, CODEGEN_READY 구현 패키지를 생성하는 MVP API 계약.
servers:
  - url: https://api.example.local/v1
security:
  - bearerAuth: []
tags:
  - name: Projects
  - name: Interviews
  - name: Transcripts
  - name: WorkModels
  - name: Opportunities
  - name: DiscoveryRecovery
  - name: DesignPackages
  - name: Blueprints
  - name: EvaluationRuns
  - name: ReleaseReadiness
  - name: ImplementationPackages
  - name: EvidenceFiles
  - name: Artifacts
paths:
  /projects:
    post:
      tags: [Projects]
      operationId: createProject
      summary: 새 업무 분석 프로젝트 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: 생성됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Projects]
      operationId: getProject
      summary: 프로젝트 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Projects]
      operationId: deleteProject
      summary: 프로젝트와 파생 데이터 삭제 요청
      responses:
        '202':
          description: 삭제 작업 접수
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletionJob'
        '404':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/interviews:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [Interviews]
      operationId: createInterview
      summary: 인터뷰 세션 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInterviewRequest'
      responses:
        '201':
          description: 생성됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Interview'
        '409':
          $ref: '#/components/responses/Problem'
  /interviews/{interviewId}:
    parameters:
      - $ref: '#/components/parameters/InterviewId'
    get:
      tags: [Interviews]
      operationId: getInterview
      summary: 인터뷰 상태 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Interview'
        '404':
          $ref: '#/components/responses/Problem'
  /interviews/{interviewId}/consent:
    parameters:
      - $ref: '#/components/parameters/InterviewId'
    post:
      tags: [Interviews]
      operationId: confirmConsent
      summary: AI·데이터·음성 처리 동의 기록
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsentRequest'
      responses:
        '200':
          description: 동의 기록됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Interview'
        '422':
          $ref: '#/components/responses/Problem'
  /interviews/{interviewId}/answers:
    parameters:
      - $ref: '#/components/parameters/InterviewId'
    post:
      tags: [Interviews]
      operationId: submitTextAnswer
      summary: 텍스트 답변 제출
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnswerRequest'
      responses:
        '202':
          description: 분석 접수
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessingJob'
        '409':
          $ref: '#/components/responses/Problem'
  /interviews/{interviewId}/audio:
    parameters:
      - $ref: '#/components/parameters/InterviewId'
    post:
      tags: [Interviews]
      operationId: submitAudioAnswer
      summary: 음성 답변 업로드 및 전사 요청
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [question_id, file]
              properties:
                question_id:
                  type: string
                file:
                  type: string
                  format: binary
                language:
                  type: string
                  default: ko-KR
      responses:
        '202':
          description: 전사 작업 접수
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscriptionJob'
        '413':
          $ref: '#/components/responses/Problem'
  /transcripts/{transcriptId}:
    parameters:
      - $ref: '#/components/parameters/TranscriptId'
    get:
      tags: [Transcripts]
      operationId: getTranscript
      summary: 전사 결과 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transcript'
        '404':
          $ref: '#/components/responses/Problem'
  /transcripts/{transcriptId}/confirm:
    parameters:
      - $ref: '#/components/parameters/TranscriptId'
    post:
      tags: [Transcripts]
      operationId: confirmTranscript
      summary: 편집된 전사 확정 및 모델 반영
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmTranscriptRequest'
      responses:
        '202':
          description: 모델 반영 접수
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessingJob'
        '409':
          $ref: '#/components/responses/Problem'
  /interviews/{interviewId}/next-question:
    parameters:
      - $ref: '#/components/parameters/InterviewId'
    post:
      tags: [Interviews]
      operationId: generateNextQuestion
      summary: 현재 모델에서 가장 중요한 후속 질문 한 개 생성
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force_closure_audit:
                  type: boolean
                  default: false
      responses:
        '200':
          description: 질문 또는 종료 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NextQuestionResult'
        '409':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/work-model:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [WorkModels]
      operationId: getWorkModel
      summary: 최신 업무 모델 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                description: work-model-v1.schema.json에 의해 검증되는 객체
        '404':
          $ref: '#/components/responses/Problem'
    patch:
      tags: [WorkModels]
      operationId: patchWorkModel
      summary: 사용자 수정사항 반영 및 새 버전 생성
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/JsonPatchOperation'
      responses:
        '200':
          description: 새 버전
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '409':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/work-model/validate:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [WorkModels]
      operationId: validateWorkModel
      summary: 사용자가 업무 지도와 추론을 확인
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateModelRequest'
      responses:
        '200':
          description: 검증 상태 갱신
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'
        '422':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/opportunities/analyze:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [Opportunities]
      operationId: analyzeOpportunities
      summary: ADF 기반 개선·자동화 후보 생성
      responses:
        '202':
          description: 분석 접수
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessingJob'
        '409':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/opportunities:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Opportunities]
      operationId: listOpportunities
      summary: 후보 목록 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
                  description: opportunity-v1.schema.json에 의해 검증되는 객체
  /projects/{projectId}/discovery-guidance:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [DiscoveryRecovery]
      operationId: getDiscoveryGuidance
      summary: latest readiness와 Work Model 기반 추가 발견 안내 조회
      responses:
        '200':
          description: deterministic discovery guidance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryGuidance'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/discovery/reopen:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [DiscoveryRecovery]
      operationId: reopenDiscovery
      summary: recovery 전용 경로로 latest interview를 NEEDS_EVIDENCE로 전환
      responses:
        '200':
          description: recovery가 열린 interview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Interview'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/discovery/reanalyze:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [DiscoveryRecovery]
      operationId: reanalyzeDiscovery
      summary: playback 승인된 새 Work Model로 opportunity 재분석
      responses:
        '201':
          description: append-only로 저장된 새 opportunity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Opportunity'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
  /opportunities/{opportunityId}/design-package:
    parameters:
      - $ref: '#/components/parameters/OpportunityId'
    post:
      tags: [DesignPackages]
      operationId: createDesignPackage
      summary: readiness-gated G1 design package 초안 생성
      responses:
        '201':
          description: 생성됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DesignPackage'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
  /opportunities/{opportunityId}/design-packages:
    parameters:
      - $ref: '#/components/parameters/OpportunityId'
    get:
      tags: [DesignPackages]
      operationId: listOpportunityDesignPackages
      summary: opportunity 기준 design package 목록 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DesignPackage'
        '404':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/design-packages:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [DesignPackages]
      operationId: listProjectDesignPackages
      summary: 프로젝트 기준 design package 목록 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DesignPackage'
        '404':
          $ref: '#/components/responses/Problem'
  /design-packages/{packageId}:
    parameters:
      - $ref: '#/components/parameters/DesignPackageId'
    get:
      tags: [DesignPackages]
      operationId: getDesignPackage
      summary: design package 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DesignPackage'
        '404':
          $ref: '#/components/responses/Problem'
  /design-packages/{packageId}/validate:
    parameters:
      - $ref: '#/components/parameters/DesignPackageId'
    post:
      tags: [DesignPackages]
      operationId: validateDesignPackage
      summary: design-package-v1 schema 검증
      responses:
        '200':
          description: 검증 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaValidationResult'
        '404':
          $ref: '#/components/responses/Problem'
  /design-packages/{packageId}/blueprint:
    parameters:
      - $ref: '#/components/parameters/DesignPackageId'
    post:
      tags: [Blueprints]
      operationId: createBlueprint
      summary: Design package에서 G1 Solution Blueprint preview 생성
      responses:
        '201':
          description: 생성됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Blueprint'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
  /design-packages/{packageId}/blueprints:
    parameters:
      - $ref: '#/components/parameters/DesignPackageId'
    get:
      tags: [Blueprints]
      operationId: listDesignPackageBlueprints
      summary: design package 기준 blueprint 목록 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Blueprint'
        '404':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/blueprints:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Blueprints]
      operationId: listProjectBlueprints
      summary: 프로젝트 기준 blueprint 목록 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Blueprint'
        '404':
          $ref: '#/components/responses/Problem'
  /blueprints/{blueprintId}:
    parameters:
      - $ref: '#/components/parameters/BlueprintId'
    get:
      tags: [Blueprints]
      operationId: getBlueprint
      summary: blueprint 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Blueprint'
        '404':
          $ref: '#/components/responses/Problem'
  /blueprints/{blueprintId}/validate:
    parameters:
      - $ref: '#/components/parameters/BlueprintId'
    post:
      tags: [Blueprints]
      operationId: validateBlueprint
      summary: blueprint-v1 schema 검증
      responses:
        '200':
          description: 검증 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaValidationResult'
        '404':
          $ref: '#/components/responses/Problem'
  /blueprints/{blueprintId}/export/json:
    parameters:
      - $ref: '#/components/parameters/BlueprintId'
    get:
      tags: [Blueprints]
      operationId: exportBlueprintJson
      summary: blueprint JSON export preview 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlueprintExport'
        '404':
          $ref: '#/components/responses/Problem'
  /blueprints/{blueprintId}/export/markdown:
    parameters:
      - $ref: '#/components/parameters/BlueprintId'
    get:
      tags: [Blueprints]
      operationId: exportBlueprintMarkdown
      summary: blueprint Markdown export preview 조회
      responses:
        '200':
          description: 성공
          content:
            text/markdown:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/evaluation-runs:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [EvaluationRuns]
      operationId: createEvaluationRun
      summary: deterministic evaluation run 생성
      responses:
        '201':
          description: 생성됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationRun'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
    get:
      tags: [EvaluationRuns]
      operationId: listProjectEvaluationRuns
      summary: 프로젝트 기준 evaluation run 목록 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EvaluationRun'
        '404':
          $ref: '#/components/responses/Problem'
  /evaluation-runs/{evaluationRunId}:
    parameters:
      - $ref: '#/components/parameters/EvaluationRunId'
    get:
      tags: [EvaluationRuns]
      operationId: getEvaluationRun
      summary: evaluation run 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationRun'
        '404':
          $ref: '#/components/responses/Problem'
  /evaluation-runs/{evaluationRunId}/validate:
    parameters:
      - $ref: '#/components/parameters/EvaluationRunId'
    post:
      tags: [EvaluationRuns]
      operationId: validateEvaluationRun
      summary: evaluation-run-v1 schema 검증
      responses:
        '200':
          description: 검증 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaValidationResult'
        '404':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/release-readiness:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [ReleaseReadiness]
      operationId: createReleaseReadiness
      summary: limited release readiness report 생성
      responses:
        '201':
          description: 생성됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseReadinessReport'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
    get:
      tags: [ReleaseReadiness]
      operationId: listProjectReleaseReadinessReports
      summary: 프로젝트 기준 release readiness report 목록 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReleaseReadinessReport'
        '404':
          $ref: '#/components/responses/Problem'
  /release-readiness/{releaseReadinessId}:
    parameters:
      - $ref: '#/components/parameters/ReleaseReadinessId'
    get:
      tags: [ReleaseReadiness]
      operationId: getReleaseReadiness
      summary: release readiness report 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseReadinessReport'
        '404':
          $ref: '#/components/responses/Problem'
  /release-readiness/{releaseReadinessId}/validate:
    parameters:
      - $ref: '#/components/parameters/ReleaseReadinessId'
    post:
      tags: [ReleaseReadiness]
      operationId: validateReleaseReadiness
      summary: release-readiness-v1 schema 검증
      responses:
        '200':
          description: 검증 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaValidationResult'
        '404':
          $ref: '#/components/responses/Problem'
  /implementation-requirements/template:
    get:
      tags: [ImplementationPackages]
      operationId: getImplementationRequirementsTemplate
      summary: M9 구현 계약 입력 template 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /projects/{projectId}/evidence-files:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [EvidenceFiles]
      operationId: uploadEvidenceFile
      summary: CSV, JSON, XLSX sample evidence 분석 및 append-only 저장
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvidenceFileUpload'
      responses:
        '201':
          description: 저장됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceFile'
        '404':
          $ref: '#/components/responses/Problem'
        '415':
          $ref: '#/components/responses/Problem'
    get:
      tags: [EvidenceFiles]
      operationId: listProjectEvidenceFiles
      summary: 프로젝트 evidence file 목록 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EvidenceFile'
        '404':
          $ref: '#/components/responses/Problem'
  /evidence-files/{evidenceFileId}/confirm:
    parameters:
      - $ref: '#/components/parameters/EvidenceFileId'
    post:
      tags: [EvidenceFiles]
      operationId: confirmEvidenceFile
      summary: 추출 schema와 sample을 사용자 확인 이벤트로 기록
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvidenceFileConfirm'
      responses:
        '200':
          description: 확인됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceFile'
        '404':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/implementation-requirements:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [ImplementationPackages]
      operationId: recordImplementationRequirements
      summary: 사용자 확인 구현 계약을 append-only 저장
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImplementationRequirementsCreate'
      responses:
        '201':
          description: 저장됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImplementationRequirements'
        '404':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/implementation-requirements/latest:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [ImplementationPackages]
      operationId: getLatestImplementationRequirements
      summary: 최신 구현 계약 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImplementationRequirements'
        '404':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/implementation-packages:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [ImplementationPackages]
      operationId: createImplementationPackage
      summary: 최신 FULL_G1 blueprint와 구현 계약으로 M9 package 생성
      responses:
        '201':
          description: 생성됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImplementationPackage'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
    get:
      tags: [ImplementationPackages]
      operationId: listProjectImplementationPackages
      summary: 프로젝트 implementation package 목록 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImplementationPackage'
        '404':
          $ref: '#/components/responses/Problem'
  /implementation-packages/{implementationPackageId}:
    parameters:
      - $ref: '#/components/parameters/ImplementationPackageId'
    get:
      tags: [ImplementationPackages]
      operationId: getImplementationPackage
      summary: implementation package 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImplementationPackage'
        '404':
          $ref: '#/components/responses/Problem'
  /implementation-packages/{implementationPackageId}/validate:
    parameters:
      - $ref: '#/components/parameters/ImplementationPackageId'
    post:
      tags: [ImplementationPackages]
      operationId: validateImplementationPackage
      summary: implementation-package-v1 schema 검증
      responses:
        '200':
          description: 검증 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaValidationResult'
        '404':
          $ref: '#/components/responses/Problem'
  /implementation-packages/{implementationPackageId}/codegen-readiness:
    parameters:
      - $ref: '#/components/parameters/ImplementationPackageId'
    get:
      tags: [ImplementationPackages]
      operationId: getCodegenReadiness
      summary: blocker, follow-up question, CODEGEN_READY gate 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodegenReadiness'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
  /implementation-packages/{implementationPackageId}/export.zip:
    parameters:
      - $ref: '#/components/parameters/ImplementationPackageId'
      - name: mode
        in: query
        required: false
        schema:
          type: string
          enum: [draft, codegen]
          default: codegen
    get:
      tags: [ImplementationPackages]
      operationId: exportImplementationPackageZip
      summary: DRAFT 또는 CODEGEN_READY implementation ZIP 생성
      responses:
        '200':
          description: ZIP archive
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
  /opportunities/{opportunityId}/select:
    parameters:
      - $ref: '#/components/parameters/OpportunityId'
    post:
      tags: [Opportunities]
      operationId: selectOpportunity
      summary: 솔루션 명세 생성 대상으로 후보 선택
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [selected]
              properties:
                selected:
                  type: boolean
                notes:
                  type: string
                  maxLength: 4000
      responses:
        '200':
          description: 선택 상태 갱신
          content:
            application/json:
              schema:
                type: object
                required: [opportunity_id, selected]
                properties:
                  opportunity_id:
                    type: string
                  selected:
                    type: boolean
        '409':
          $ref: '#/components/responses/Problem'
  /projects/{projectId}/export:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [Artifacts]
      operationId: exportProject
      summary: 업무 모델·후보·명세를 ZIP으로 내보내기
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                formats:
                  type: array
                  items:
                    type: string
                    enum: [MARKDOWN, JSON, YAML]
                  default: [MARKDOWN, JSON]
      responses:
        '202':
          description: 내보내기 접수
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessingJob'
  /artifacts/{artifactId}:
    parameters:
      - $ref: '#/components/parameters/ArtifactId'
    get:
      tags: [Artifacts]
      operationId: getArtifact
      summary: 산출물 메타데이터와 제한 시간 다운로드 URL 조회
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artifact'
        '404':
          $ref: '#/components/responses/Problem'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
    InterviewId:
      name: interviewId
      in: path
      required: true
      schema:
        type: string
    TranscriptId:
      name: transcriptId
      in: path
      required: true
      schema:
        type: string
    OpportunityId:
      name: opportunityId
      in: path
      required: true
      schema:
        type: string
    DesignPackageId:
      name: packageId
      in: path
      required: true
      schema:
        type: string
    BlueprintId:
      name: blueprintId
      in: path
      required: true
      schema:
        type: string
    EvaluationRunId:
      name: evaluationRunId
      in: path
      required: true
      schema:
        type: string
    ReleaseReadinessId:
      name: releaseReadinessId
      in: path
      required: true
      schema:
        type: string
    EvidenceFileId:
      name: evidenceFileId
      in: path
      required: true
      schema:
        type: string
    ImplementationPackageId:
      name: implementationPackageId
      in: path
      required: true
      schema:
        type: string
    ArtifactId:
      name: artifactId
      in: path
      required: true
      schema:
        type: string
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: 최신 업무 모델 버전 ETag
      schema:
        type: string
  responses:
    Problem:
      description: RFC 9457 스타일 오류 응답
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    CreateProjectRequest:
      type: object
      additionalProperties: false
      required: [title, purpose]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        purpose:
          type: string
          minLength: 1
          maxLength: 2000
        data_region:
          type: string
          maxLength: 50
    Project:
      type: object
      additionalProperties: false
      required: [project_id, title, purpose, status, created_at, updated_at]
      properties:
        project_id:
          type: string
        title:
          type: string
        purpose:
          type: string
        status:
          type: string
          enum: [DRAFT, INTERVIEWING, ANALYZING, BLUEPRINT_READY, PAUSED, DELETION_PENDING, DELETED]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateInterviewRequest:
      type: object
      additionalProperties: false
      required: [mode]
      properties:
        mode:
          type: string
          enum: [QUICK, STANDARD, DEEP]
        language:
          type: string
          default: ko-KR
    ConsentRequest:
      type: object
      additionalProperties: false
      required: [ai_use, data_processing, audio_recording, audio_retention]
      properties:
        ai_use:
          type: boolean
        data_processing:
          type: boolean
        audio_recording:
          type: boolean
        audio_retention:
          type: string
          enum: [DELETE_AFTER_TRANSCRIPT_CONFIRMATION, KEEP_UNTIL_PROJECT_DELETION, NOT_APPLICABLE]
    Interview:
      type: object
      additionalProperties: false
      required: [interview_id, project_id, state, mode, round, created_at, updated_at]
      properties:
        interview_id:
          type: string
        project_id:
          type: string
        state:
          type: string
        mode:
          type: string
        round:
          type: integer
          minimum: 0
        coverage:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AnswerRequest:
      type: object
      additionalProperties: false
      required: [question_id, text]
      properties:
        question_id:
          type: string
        text:
          type: string
          minLength: 1
          maxLength: 50000
        client_answer_id:
          type: string
          description: 재시도 시 중복 생성을 막기 위한 클라이언트 멱등 키
    TranscriptionJob:
      allOf:
        - $ref: '#/components/schemas/ProcessingJob'
        - type: object
          properties:
            transcript_id:
              type: string
    Transcript:
      type: object
      additionalProperties: false
      required: [transcript_id, interview_id, status, text, segments, audio_deletion_policy]
      properties:
        transcript_id:
          type: string
        interview_id:
          type: string
        status:
          type: string
          enum: [PROCESSING, READY_FOR_CONFIRMATION, CONFIRMED, FAILED]
        text:
          type: string
        segments:
          type: array
          items:
            type: object
            required: [segment_id, start_ms, end_ms, text]
            properties:
              segment_id:
                type: string
              start_ms:
                type: integer
                minimum: 0
              end_ms:
                type: integer
                minimum: 0
              text:
                type: string
        audio_deletion_policy:
          type: string
        confirmed_at:
          type: [string, 'null']
          format: date-time
    ConfirmTranscriptRequest:
      type: object
      additionalProperties: false
      required: [confirmed_text]
      properties:
        confirmed_text:
          type: string
          minLength: 1
          maxLength: 50000
        corrections_note:
          type: string
          maxLength: 4000
    NextQuestionResult:
      type: object
      additionalProperties: false
      required: [result]
      properties:
        result:
          type: string
          enum: [QUESTION, NEEDS_EVIDENCE, READY_WITH_ASSUMPTIONS, READY_FOR_ANALYSIS, NOT_SUITABLE]
        question:
          oneOf:
            - $ref: '#/components/schemas/Question'
            - type: 'null'
        open_evidence_requests:
          type: array
          items:
            type: string
    Question:
      type: object
      additionalProperties: false
      required: [question_id, text, question_type, why_it_matters]
      properties:
        question_id:
          type: string
        text:
          type: string
        question_type:
          type: string
        why_it_matters:
          type: string
        answer_format_hint:
          type: string
    ValidateModelRequest:
      type: object
      additionalProperties: false
      required: [model_version, confirmed, corrections]
      properties:
        model_version:
          type: integer
          minimum: 1
        confirmed:
          type: boolean
        corrections:
          type: array
          items:
            $ref: '#/components/schemas/JsonPatchOperation'
        notes:
          type: string
          maxLength: 4000
    ValidationResult:
      type: object
      additionalProperties: false
      required: [model_id, version, status, understanding_gate]
      properties:
        model_id:
          type: string
        version:
          type: integer
        status:
          type: string
        understanding_gate:
          type: object
          additionalProperties: true
    SchemaValidationResult:
      type: object
      additionalProperties: false
      required: [valid, schema_name]
      properties:
        valid:
          type: boolean
        schema_name:
          type: string
        error:
          type: [string, 'null']
    Opportunity:
      type: object
      additionalProperties: false
      required: [id, project_id, work_model_version, payload, schema_valid, created_at]
      properties:
        id:
          type: string
        project_id:
          type: string
        work_model_version:
          type: integer
          minimum: 1
        payload:
          type: object
          additionalProperties: true
          description: opportunity-v1.schema.json에 의해 검증되며 M8.1 risk_profile을 포함하는 객체
        schema_valid:
          type: boolean
        created_at:
          type: string
          format: date-time
    DiscoveryGuidance:
      type: object
      additionalProperties: false
      required:
        - project_id
        - gate_result
        - recovery_required
        - missing_dimensions
        - recommended_questions
        - suggested_evidence_prompt
        - can_reopen
        - can_reanalyze
      properties:
        project_id:
          type: string
        interview_id:
          type: [string, 'null']
        interview_status:
          type: [string, 'null']
        gate_result:
          type: string
          enum: [BLOCKED, DISCOVERY_NEEDED, ENABLE_FIRST, READY_FOR_DESIGN]
        recovery_required:
          type: boolean
        missing_dimensions:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [key, label, reason]
            properties:
              key:
                type: string
              label:
                type: string
              reason:
                type: string
        recommended_questions:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [id, dimension, text, source]
            properties:
              id:
                type: string
              dimension:
                type: string
              text:
                type: string
              source:
                type: string
        suggested_evidence_prompt:
          type: string
        can_reopen:
          type: boolean
        can_reanalyze:
          type: boolean
        latest_work_model_version:
          type: [integer, 'null']
        latest_opportunity_id:
          type: [string, 'null']
        latest_opportunity_work_model_version:
          type: [integer, 'null']
    DesignPackage:
      type: object
      additionalProperties: false
      required:
        - id
        - project_id
        - opportunity_id
        - work_model_version
        - payload
        - schema_valid
        - created_at
      properties:
        id:
          type: string
        project_id:
          type: string
        opportunity_id:
          type: string
        work_model_version:
          type: integer
          minimum: 1
        payload:
          type: object
          additionalProperties: true
          description: design-package-v1.schema.json에 의해 검증되는 객체
        schema_valid:
          type: boolean
        created_at:
          type: string
          format: date-time
    Blueprint:
      type: object
      additionalProperties: false
      required:
        - id
        - project_id
        - design_package_id
        - payload
        - schema_valid
        - export_ready
        - created_at
      properties:
        id:
          type: string
        project_id:
          type: string
        design_package_id:
          type: string
        payload:
          type: object
          additionalProperties: true
          description: blueprint-v1.schema.json에 의해 검증되는 객체
        schema_valid:
          type: boolean
        export_ready:
          type: boolean
        created_at:
          type: string
          format: date-time
    BlueprintExport:
      type: object
      additionalProperties: true
      required: [export_format, blueprint_id, project_id, payload]
      properties:
        export_format:
          type: string
          enum: [json]
        blueprint_id:
          type: string
        project_id:
          type: string
        payload:
          type: object
          additionalProperties: true
    EvaluationRun:
      type: object
      additionalProperties: false
      required:
        - id
        - project_id
        - payload
        - schema_valid
        - created_at
      properties:
        id:
          type: string
        project_id:
          type: string
        payload:
          type: object
          additionalProperties: true
          description: evaluation-run-v1.schema.json에 의해 검증되는 객체
        schema_valid:
          type: boolean
        created_at:
          type: string
          format: date-time
    ReleaseReadinessReport:
      type: object
      additionalProperties: false
      required:
        - id
        - project_id
        - payload
        - schema_valid
        - created_at
      properties:
        id:
          type: string
        project_id:
          type: string
        payload:
          type: object
          additionalProperties: true
          description: release-readiness-v1.schema.json에 의해 검증되는 객체
        schema_valid:
          type: boolean
        created_at:
          type: string
          format: date-time
    EvidenceFileUpload:
      type: object
      additionalProperties: false
      required: [role, filename, content_type, content_base64]
      properties:
        role:
          type: string
          enum: [INPUT, EXPECTED_OUTPUT]
        filename:
          type: string
          minLength: 1
          maxLength: 200
        content_type:
          type: string
          minLength: 1
          maxLength: 100
        content_base64:
          type: string
          contentEncoding: base64
    EvidenceFileConfirm:
      type: object
      additionalProperties: false
      required: [confirmed]
      properties:
        confirmed:
          type: boolean
        confirmed_by:
          type: string
          minLength: 1
          maxLength: 100
          default: local-user
    EvidenceFile:
      type: object
      additionalProperties: false
      required:
        - id
        - project_id
        - role
        - filename
        - content_type
        - size_bytes
        - sha256
        - extracted_schema
        - sample_values
        - confirmed
        - created_at
      properties:
        id:
          type: string
        project_id:
          type: string
        role:
          type: string
          enum: [INPUT, EXPECTED_OUTPUT]
        filename:
          type: string
        content_type:
          type: string
        size_bytes:
          type: integer
          minimum: 1
        sha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
        extracted_schema:
          type: object
          additionalProperties: true
        sample_values:
          type: object
          additionalProperties: true
        confirmed:
          type: boolean
        created_at:
          type: string
          format: date-time
    ImplementationRequirementsCreate:
      type: object
      additionalProperties: false
      required: [payload]
      properties:
        payload:
          type: object
          additionalProperties: true
        confirmed:
          type: boolean
          default: false
    ImplementationRequirements:
      type: object
      additionalProperties: false
      required: [id, project_id, payload, confirmed, created_at]
      properties:
        id:
          type: string
        project_id:
          type: string
        payload:
          type: object
          additionalProperties: true
        confirmed:
          type: boolean
        created_at:
          type: string
          format: date-time
    ImplementationPackage:
      type: object
      additionalProperties: false
      required:
        - id
        - project_id
        - blueprint_id
        - payload
        - schema_valid
        - readiness_status
        - created_at
      properties:
        id:
          type: string
        project_id:
          type: string
        blueprint_id:
          type: string
        payload:
          type: object
          additionalProperties: true
          description: implementation-package-v1.schema.json에 의해 검증되는 객체
        schema_valid:
          type: boolean
        readiness_status:
          type: string
          enum: [DESIGN_READY, IMPLEMENTATION_READY, CODEGEN_READY]
        created_at:
          type: string
          format: date-time
    CodegenReadiness:
      type: object
      additionalProperties: false
      required:
        - package_id
        - project_id
        - status
        - codegen_ready
        - blockers
        - follow_up_questions
        - checks
        - evaluated_at
      properties:
        package_id:
          type: string
        project_id:
          type: string
        status:
          type: string
          enum: [DESIGN_READY, IMPLEMENTATION_READY, CODEGEN_READY]
        codegen_ready:
          type: boolean
        blockers:
          type: array
          items:
            type: string
        follow_up_questions:
          type: array
          items:
            type: string
        checks:
          type: array
          items:
            type: object
            additionalProperties: true
        evaluated_at:
          type: string
          format: date-time
    JsonPatchOperation:
      type: object
      required: [op, path]
      properties:
        op:
          type: string
          enum: [add, remove, replace, move, copy, test]
        path:
          type: string
        from:
          type: string
        value: {}
    ProcessingJob:
      type: object
      additionalProperties: false
      required: [job_id, status, submitted_at]
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: [QUEUED, RUNNING, SUCCEEDED, FAILED]
        submitted_at:
          type: string
          format: date-time
    DeletionJob:
      type: object
      additionalProperties: false
      required: [deletion_job_id, project_id, status, requested_at]
      properties:
        deletion_job_id:
          type: string
        project_id:
          type: string
        status:
          type: string
          enum: [QUEUED, RUNNING, COMPLETED, FAILED]
        requested_at:
          type: string
          format: date-time
    Artifact:
      type: object
      additionalProperties: false
      required: [artifact_id, project_id, kind, status, created_at]
      properties:
        artifact_id:
          type: string
        project_id:
          type: string
        kind:
          type: string
          enum: [PROJECT_EXPORT, SOLUTION_BLUEPRINT, WORK_MODEL, OPPORTUNITY_REPORT]
        status:
          type: string
          enum: [GENERATING, READY, FAILED, EXPIRED]
        download_url:
          type: [string, 'null']
          format: uri
        expires_at:
          type: [string, 'null']
          format: date-time
        created_at:
          type: string
          format: date-time
    Problem:
      type: object
      required: [type, title, status, trace_id]
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
        trace_id:
          type: string
